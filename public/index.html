<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swat</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0c;
      }
      body.flash {
        box-shadow: inset 0 0 120px rgba(220, 40, 40, 0.55);
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 2;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        color: #f0f0f0;
        text-shadow: 0 1px 3px #000;
        pointer-events: none;
      }
      #hud .hint {
        margin: 10px 0 0;
        max-width: 22rem;
        font-size: 12px;
        opacity: 0.85;
        line-height: 1.35;
      }
      #hud .net {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.9;
      }
      #death-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        background: rgba(8, 6, 10, 0.45);
        font-family: system-ui, sans-serif;
        color: #f5f5f5;
        text-shadow: 0 2px 12px #000;
      }
      body.dead #death-overlay {
        display: flex;
      }
      #death-overlay h2 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 600;
      }
      #death-overlay .countdown {
        font-size: clamp(2rem, 6vw, 3rem);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="death-overlay">
      <h2 id="death-title">You died</h2>
      <p class="countdown">Respawn in <span id="death-countdown">10</span>s</p>
    </div>
    <div id="hud">
      <div>Bites: <span id="bites">0</span></div>
      <div>Deaths (swat): <span id="swats">0</span></div>
      <div>Deaths (predator): <span id="preds">0</span></div>
      <div>Total deaths: <span id="deaths">0</span></div>
      <div id="net-status" class="net">Connecting…</div>
      <p class="hint">
        <strong>Thrust:</strong> WASD · Space/Ctrl lift · arrows yaw ·
        <strong>Bites:</strong> land on the giant (slow + touching skin) ·
        <code>?room=beach</code>
      </p>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.172.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
