<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swat</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0c;
      }
      body.flash {
        box-shadow: inset 0 0 120px rgba(220, 40, 40, 0.55);
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 2;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        color: #f0f0f0;
        text-shadow: 0 1px 3px #000;
        pointer-events: none;
      }
      #hud .hint {
        margin: 10px 0 0;
        max-width: 22rem;
        font-size: 12px;
        opacity: 0.85;
        line-height: 1.35;
      }
      #hud .net {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div>Bites: <span id="bites">0</span></div>
      <div>Swats: <span id="swats">0</span></div>
      <div id="net-status" class="net">Connecting…</div>
      <p class="hint">
        WASD thrust / strafe · Space / Ctrl lift · Arrows turn (clunky
        momentum)
      </p>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.172.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
